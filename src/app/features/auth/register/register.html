<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">📚</span>
      <h1>Study Planner</h1>
      <p>Stwórz konto i zacznij planować naukę.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>LOGIN</label>
        <input formControlName="login" type="text" placeholder="np. jan_kowalski" />
        <span class="hint" *ngIf="form.get('login')?.touched && form.get('login')?.hasError('minlength')">
          Minimum 3 znaki
        </span>
      </div>

      <div class="form-group">
        <label>HASŁO</label>
        <input formControlName="password" type="password" placeholder="Minimum 8 znaków" />
        <span class="hint" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">
          Minimum 8 znaków
        </span>
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
        {{ loading ? 'Rejestrowanie...' : 'Zarejestruj się →' }}
      </button>
    </form>

    <p class="auth-footer">
      Masz już konto? <a routerLink="/login">Zaloguj się</a>
    </p>
  </div>
</div>
